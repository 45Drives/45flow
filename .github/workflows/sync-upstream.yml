name: Sync upstream bugfixes (disabled)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout premium repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify SYNC_PAT exists
        run: |
          if [ -z "${{ secrets.SYNC_PAT }}" ]; then
            echo "SYNC_PAT is missing or unavailable to this workflow run."
            exit 1
          fi

      - name: Fetch upstream and attempt merge
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://x-access-token:${{ secrets.SYNC_PAT }}@github.com/45Drives/studio-share.git
          git fetch upstream main

          BEHIND=$(git rev-list HEAD..upstream/main --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"

          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date."
            exit 0
          fi

          BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git checkout -b "$BRANCH"

          if git merge upstream/main --no-edit; then
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
          else
            echo "conflicts=true" >> "$GITHUB_OUTPUT"
            git status
            git merge --abort || true
            exit 1
          fi

          git push origin "$BRANCH"

      - name: Create pull request
        if: steps.merge.outputs.behind != '0' && steps.merge.outputs.conflicts != 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "Sync bugfixes from studio-share" \
            --body "Automated merge from studio-share upstream.

          Commits behind: ${{ steps.merge.outputs.behind }}
          Has conflicts: ${{ steps.merge.outputs.conflicts }}

          Clean merge. Review and merge when ready."